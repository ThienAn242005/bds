name: Identity Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'identity-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (CI)
        run: |
          mvn clean install -DskipTests -am -pl identity-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Dùng biến để GitHub tự lấy từ Settings, không dán code trực tiếp
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image (CD)
        uses: docker/build-push-action@v5
        with:
          context: ./identity-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/homeverse-identity:latest
name: Property Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'property-service/**' # Đổi chỗ này cho từng service

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (CI)
        run: |
          # Dùng lệnh này để tự build luôn cả Common/Parent nếu cần
          mvn clean install -DskipTests -am -pl property-service 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image (CD)
        uses: docker/build-push-action@v5
        with:
          context: ./property-service # Đổi chỗ này
          push: true
          # Đổi tên Image tương ứng (Ví dụ: homeverse-customer)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/homeverse-property:latest
events {
    worker_connections 1024;
}

http {

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;

        # 1. Identity Service
        location /auth/ {
            proxy_pass http://identity-service:8081;
        }

        location /admin/ {
            proxy_pass http://identity-service:8081;
        }

        # 2. Customer Service
        location /customers/ {
            proxy_pass http://customer-service:8082;


            client_max_body_size 20M;
        }

        # 3. Media Service (Xử lý upload nặng)
        location /media/ {
            proxy_pass http://media-service:8084;

            client_max_body_size 100M;
            client_body_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;


            proxy_request_buffering off;
            proxy_buffering off;
        }
        # Notification service
        location /api/notifications/ {
            proxy_pass http://notification-service:8085;
        }
        location /ws-notifier/ {
            proxy_pass http://notification-service:8085;


            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";


            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }


    }
}
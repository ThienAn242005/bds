version: '3.8'

services:
  # ==========================================
  # 1. DATABASE CHO CÁC SERVICE
  # ==========================================
  postgres-identity:
    image: postgres:16-alpine
    container_name: postgres-identity
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=identity_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    networks:
      - homeverse-network
    volumes:
      - identity-db-data:/var/lib/postgresql/data

  postgres-customer:
    image: postgres:16-alpine
    container_name: postgres-customer
    ports:
      - "5433:5432" # Map port 5433 ở máy host vào 5432 của container
    environment:
      - POSTGRES_DB=customer_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    networks:
      - homeverse-network
    volumes:
      - customer-db-data:/var/lib/postgresql/data

  # ==========================================
  # 2. CÁC MICROSERVICES
  # ==========================================
  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres-identity
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-identity:5432/identity_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
      # QUAN TRỌNG: Trỏ URL của Customer Service sang tên container để OpenFeign gọi chéo thành công
      - HOMEVERSE_SERVICES_CUSTOMER=http://customer-service:8082
    networks:
      - homeverse-network

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres-customer
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-customer:5432/customer_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    networks:
      - homeverse-network

  # ==========================================
  # 3. NGINX - ĐÓNG VAI TRÒ API GATEWAY
  # ==========================================
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80" # Frontend (React/Mobile) chỉ cần gọi vào localhost:8080
    volumes:
      # Mount file cấu hình nginx từ máy host vào container
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-service
      - customer-service
    networks:
      - homeverse-network

# Định nghĩa mạng nội bộ để các container nhìn thấy nhau qua tên
networks:
  homeverse-network:
    driver: bridge

# Mount volume để dữ liệu DB không bị mất khi tắt container
volumes:
  identity-db-data:
  customer-db-data:
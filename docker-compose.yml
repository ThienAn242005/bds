version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - homeverse-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - homeverse-network

  redis-customer:
    image: redis:alpine
    container_name: redis-customer
    ports:
      - "6379:6379"
    networks:
      - homeverse-network

  debezium-connect:
    image: quay.io/debezium/connect:2.4
    container_name: debezium-connect
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    depends_on:
      - kafka
      - postgres-identity
    networks:
      - homeverse-network

  postgres-identity:
    image: postgres:16-alpine
    container_name: postgres-identity
    ports:
      - "${POSTGRES_IDENTITY_PORT:-5431}:5432"
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c wal_level=logical
    networks:
      - homeverse-network
    volumes:
      - identity-db-data-v2:/var/lib/postgresql/data

  postgres-customer:
    image: postgres:16-alpine
    container_name: postgres-customer
    ports:
      - "${POSTGRES_CUSTOMER_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - homeverse-network
    volumes:
      - customer-db-data:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    ports:
      - "${POSTGRES_NOTIFICATION_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - homeverse-network
    volumes:
      - notification-db-data:/var/lib/postgresql/data

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    ports:
      - "${POSTGRES_PAYMENT_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - homeverse-network
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres-identity
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-identity:5432/identity_db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - homeverse-network

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres-customer
      - kafka
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-customer:5432/customer_db
      - CUSTOMER_DB_HOST=postgres-customer
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MEDIA_SERVICE_URL=http://media-service:8084
    networks:
      - homeverse-network

  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: media-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    networks:
      - homeverse-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"
    depends_on:
      - kafka
      - redis-customer
      - postgres-notification
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notification:5432/notification_db
    networks:
      - homeverse-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - postgres-payment
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-payment:5432/payment_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - homeverse-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-service
      - customer-service
      - payment-service
    networks:
      - homeverse-network

networks:
  homeverse-network:
    driver: bridge

volumes:
  identity-db-data-v2:
  customer-db-data:
  notification-db-data:
  payment-db-data:
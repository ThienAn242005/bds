server:
  port: 8081 # Chạy trên cổng 8081 để không đụng với các service khác (như room-service chạy 8082)

spring:
  application:
    name: identity-service

  # Cấu hình kết nối PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/identity_db
    username: postgres # Đổi lại thành username DB trên máy bạn nếu khác
    password: 123456 # Đổi lại thành password DB trên máy bạn nếu khác
    driver-class-name: org.postgresql.Driver

  # Cấu hình Hibernate tự động tạo/cập nhật bảng
  jpa:
    hibernate:
      ddl-auto: update # Tự động tạo bảng users nếu chưa có
    show-sql: true # Hiển thị câu lệnh SQL trên console để dễ debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Cấu hình JWT (Trùng khớp với các biến @Value trong JwtUtils)
jwt:
  secret: DayLaMotDoanBaoMatRatDaiChoHeThongHomeVerseCuaBan2026DeDungChoThuatToanHS256
  expiration: 86400000 # Thời gian sống của Token: 24 giờ (tính bằng milliseconds)

# Cấu hình log để dễ nhìn lỗi
logging:
  level:
    org.springframework.security: INFO
    com.homeverse.identity: DEBUG
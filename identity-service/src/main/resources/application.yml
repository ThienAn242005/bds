server:
  port: 8081

spring:
  application:
    name: identity-service

  # Cấu hình mặc định khi chạy trực tiếp trên IntelliJ (Local)
  datasource:
    url: jdbc:postgresql://localhost:5432/identity_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.homeverse: DEBUG

---
# Cấu hình riêng khi chạy bằng Docker
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # Lưu ý: host ở đây phải khớp với container_name trong docker-compose.yml
    url: jdbc:postgresql://postgres-identity:5432/identity_db